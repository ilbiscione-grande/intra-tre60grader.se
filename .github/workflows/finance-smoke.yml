name: finance-smoke

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'lib/rpc/**'
      - 'app/api/**'
      - 'app/(app)/**'
      - 'package.json'
      - '.github/workflows/finance-smoke.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  finance_sql_smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_DB_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Run finance smoke SQL
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/20260305_finance_rpc_smoke.sql
      - name: Run finance golden SQL
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/20260307_finance_golden_tests.sql
      - name: Run permission matrix smoke SQL (B8)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/20260307_permissions_smoke_b8.sql
